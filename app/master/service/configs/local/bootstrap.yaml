server:
  http:
    listen:
      addr: "0.0.0.0:8001"
      timeout: 10s
  grpc:
    listen:
      addr: "0.0.0.0:8000"
      timeout: 10s

data:
  client:
    services:
      - name: worker.service
        endpoints:
          - protocol: grpc
            endpoint: "discovery:///worker.service"
            timeout: 5s
            tls:
              enable: true
              ca_path: "./configs/certs/tls.crt"

app:
  env: "dev"

obs:
  log:
    level: 1
    backends:
      - stdout: {}
      - file:
          path: "./logs/master.service.log"
          max_backups: 10
          max_age: 30
  metrics:
    enable: true
  trace:
    endpoint: "localhost:4317"
    insecure: true
    sampling_ratio: 1.0

registry:
  consul:
    addr: "${REGISTRY_CONSUL_ADDR:localhost:8500}"
    scheme: "${REGISTRY_CONSUL_SCHEME:http}"
    datacenter: "${REGISTRY_CONSUL_DC:dc1}"
