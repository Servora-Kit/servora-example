server:
  http:
    listen:
      addr: "0.0.0.0:8013"
      timeout: 10s
  grpc:
    listen:
      addr: "0.0.0.0:8012"
      timeout: 10s
    registry:
      host: "${G_REGISTRY_HOST:}"

data:
  client:
    grpc:
      - service_name: worker.service
        endpoint: "discovery:///worker.service"
        timeout: 5s
        tls:
          enable: true
          ca_path: "./configs/certs/tls.crt"

app:
  env: "dev"
  log:
    level: 0
    filename: "./logs/master.service.log"
    max_size: 20
    max_age: 30
    max_backups: 10

metrics:
  enable: true

registry:
  consul:
    addr: "${REGISTRY_CONSUL_ADDR:localhost:8500}"
    scheme: "${REGISTRY_CONSUL_SCHEME:http}"
    datacenter: "${REGISTRY_CONSUL_DC:dc1}"

discovery:
  consul:
    addr: "${DISCOVERY_CONSUL_ADDR:localhost:8500}"
    scheme: "${DISCOVERY_CONSUL_SCHEME:http}"
    datacenter: "${DISCOVERY_CONSUL_DC:dc1}"
