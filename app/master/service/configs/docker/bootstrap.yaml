server:
  http:
    listen:
      addr: "0.0.0.0:8001"
      timeout: 10s
  grpc:
    listen:
      addr: "0.0.0.0:8000"
      timeout: 10s

data:
  client:
    services:
      - name: worker.service
        endpoints:
          - protocol: grpc
            endpoint: "discovery:///worker.service"
            timeout: 5s

app:
  env: "prod"

obs:
  log:
    level: 1
    backends:
      - stdout: {}
      - file:
          path: "/app/logs/master.service.log"
          max_backups: 10
          max_age: 30
  trace:
    endpoint: "otel-collector:4317"
    insecure: true
    sampling_ratio: 1.0
  metrics:
    enable: true

registry:
  consul:
    addr: "consul:8500"
    scheme: "http"
    datacenter: "dc1"
