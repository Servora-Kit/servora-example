syntax = "proto3";

package master.service.v1;

import "google/api/annotations.proto";
import "servora/authn/v1/annotations.proto";
import "worker/service/v1/worker.proto";

option go_package = "github.com/Servora-Kit/servora-example/api/gen/go/master/service/v1;masterpb";

service MasterService {
  rpc Hello(worker.service.v1.HelloRequest) returns (worker.service.v1.HelloResponse) {
    option (google.api.http) = {
      get: "/v1/hello"
    };
    option (servora.authn.v1.rule) = {
      mode: MODE_REQUIRED
      schemes: ["jwt", "apikey"]
    };
  }
}
