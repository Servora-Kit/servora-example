syntax = "proto3";

package worker.service.v1;

import "buf/validate/validate.proto";
import "servora/authn/v1/annotations.proto";

option go_package = "github.com/Servora-Kit/servora-example/api/gen/go/worker/service/v1;workerpb";

service WorkerService {
  rpc Hello(HelloRequest) returns (HelloResponse) {
    option (servora.authn.v1.rule) = {
      mode: MODE_REQUIRED
      schemes: ["jwt", "apikey"]
    };
  }
}

message HelloRequest {
  string greeting = 1 [(buf.validate.field).required = true];
}

message HelloResponse {
  string reply = 1;
}
