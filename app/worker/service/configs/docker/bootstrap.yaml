server:
  grpc:
    listen:
      addr: "0.0.0.0:8010"
      timeout: 10s

app:
  env: "prod"

obs:
  log:
    level: 1
    backends:
      - stdout: {}
      - file:
          path: "/app/logs/worker.service.log"
          max_backups: 10
          max_age: 30
  trace:
    endpoint: "otel-collector:4317"
    insecure: true
    sampling_ratio: 1.0
  metrics:
    enable: true

registry:
  consul:
    addr: "consul:8500"
    scheme: "http"
    datacenter: "dc1"
