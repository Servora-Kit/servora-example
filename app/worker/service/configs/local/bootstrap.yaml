server:
  grpc:
    listen:
      addr: "0.0.0.0:8010"
      timeout: 10s
    tls:
      enable: true
      cert_path: "./configs/certs/tls.crt"
      key_path: "./configs/certs/tls.key"

app:
  env: "dev"

obs:
  log:
    level: 1
    backends:
      - stdout: {}
      - file:
          path: "./logs/worker.service.log"
          max_backups: 10
          max_age: 30
  metrics:
    enable: true
  trace:
    endpoint: "localhost:4317"
    insecure: true
    sampling_ratio: 1.0

registry:
  consul:
    addr: "${REGISTRY_CONSUL_ADDR:localhost:8500}"
    scheme: "${REGISTRY_CONSUL_SCHEME:http}"
    datacenter: "${REGISTRY_CONSUL_DC:dc1}"
