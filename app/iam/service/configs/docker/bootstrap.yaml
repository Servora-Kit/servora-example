server:
  http:
    addr: "0.0.0.0:8000"
    timeout: 10s
  grpc:
    addr: "0.0.0.0:8001"
    timeout: 10s

data:
  database:
    driver: "postgres"
    source: "host=db user=servora password=servora dbname=servora port=5432 sslmode=disable"
  redis:
    addr: "redis:6379"
    password: "servora_redis_pwd"
    db: 0

app:
  env: "prod"
  jwt:
    access_secret: "servora_access_secret_change_me"
    refresh_secret: "servora_refresh_secret_change_me"
    access_expire: 3600
    refresh_expire: 604800
  log:
    level: 0
    filename: "/app/logs/iam.service.log"
    max_size: 20
    max_age: 30
    max_backups: 10

trace:
  endpoint: "otel-collector:4317"
  insecure: true
  sampling_ratio: 1.0

metrics:
  enable: true

registry:
  consul:
    addr: "consul:8500"
    scheme: "http"
    datacenter: "dc1"

discovery:
  consul:
    addr: "consul:8500"
    scheme: "http"
    datacenter: "dc1"
