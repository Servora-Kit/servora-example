syntax = "proto3";

package iam.service.v1;

import "google/api/annotations.proto";
import "authz/service/v1/authz.proto";
import "user/service/v1/user.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/iam/service/v1;iampb";

service UserService {
  rpc CurrentUserInfo(user.service.v1.CurrentUserInfoRequest) returns (user.service.v1.CurrentUserInfoResponse) {
    option (google.api.http) = {get: "/v1/user/info"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc GetUser(user.service.v1.GetUserRequest) returns (user.service.v1.GetUserResponse) {
    option (google.api.http) = {get: "/v1/users/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_VIEW
    };
  }

  rpc ListUsers(user.service.v1.ListUsersRequest) returns (user.service.v1.ListUsersResponse) {
    option (google.api.http) = {get: "/v1/users"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_VIEW
    };
  }

  rpc UpdateUser(user.service.v1.UpdateUserRequest) returns (user.service.v1.UpdateUserResponse) {
    option (google.api.http) = {
      post: "/v1/user/update"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc CreateUser(user.service.v1.CreateUserRequest) returns (user.service.v1.CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE_MEMBERS
    };
  }

  rpc DeleteUser(user.service.v1.DeleteUserRequest) returns (user.service.v1.DeleteUserResponse) {
    option (google.api.http) = {delete: "/v1/users/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
    };
  }

  rpc PurgeUser(user.service.v1.PurgeUserRequest) returns (user.service.v1.PurgeUserResponse) {
    option (google.api.http) = {delete: "/v1/users/{id}/purge"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
    };
  }

  rpc RestoreUser(user.service.v1.RestoreUserRequest) returns (user.service.v1.RestoreUserResponse) {
    option (google.api.http) = {
      post: "/v1/users/{id}/restore"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
    };
  }
}
