syntax = "proto3";

package iam.service.v1;

import "google/api/annotations.proto";
import "application/service/v1/application.proto";
import "authz/service/v1/authz.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/iam/service/v1;iampb";

service ApplicationService {
  rpc CreateApplication(application.service.v1.CreateApplicationRequest) returns (application.service.v1.CreateApplicationResponse) {
    option (google.api.http) = {
      post: "/v1/applications"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      relation: RELATION_CAN_MANAGE
      object_type: OBJECT_TYPE_TENANT
    };
  }

  rpc GetApplication(application.service.v1.GetApplicationRequest) returns (application.service.v1.GetApplicationResponse) {
    option (google.api.http) = {get: "/v1/applications/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc ListApplications(application.service.v1.ListApplicationsRequest) returns (application.service.v1.ListApplicationsResponse) {
    option (google.api.http) = {get: "/v1/applications"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      relation: RELATION_CAN_VIEW
      object_type: OBJECT_TYPE_TENANT
    };
  }

  rpc UpdateApplication(application.service.v1.UpdateApplicationRequest) returns (application.service.v1.UpdateApplicationResponse) {
    option (google.api.http) = {
      put: "/v1/applications/{id}"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc DeleteApplication(application.service.v1.DeleteApplicationRequest) returns (application.service.v1.DeleteApplicationResponse) {
    option (google.api.http) = {delete: "/v1/applications/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc RegenerateClientSecret(application.service.v1.RegenerateClientSecretRequest) returns (application.service.v1.RegenerateClientSecretResponse) {
    option (google.api.http) = {
      post: "/v1/applications/{id}/regenerate-secret"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }
}
