name: servora authorization model tests
model_file: ../model/servora.fga

tuples:
  # Tenant admin
  - user: user:tenant-admin
    relation: admin
    object: tenant:root

  # Organization setup
  - user: tenant:root
    relation: tenant
    object: organization:acme

  - user: user:org-owner
    relation: owner
    object: organization:acme

  - user: user:org-admin
    relation: admin
    object: organization:acme

  - user: user:org-member
    relation: member
    object: organization:acme

  - user: user:org-viewer
    relation: viewer
    object: organization:acme

  # Organization member also on tenant
  - user: user:org-owner
    relation: member
    object: tenant:root

  # Project setup
  - user: organization:acme
    relation: organization
    object: project:alpha

  - user: user:proj-member
    relation: member
    object: project:alpha

  - user: user:proj-viewer
    relation: viewer
    object: project:alpha

tests:
  - name: tenant admin has member and can_manage access
    check:
      - user: user:tenant-admin
        object: tenant:root
        assertions:
          admin: true
          member: true
          can_view: true
          can_manage: true

  - name: organization owner inherits admin and member
    check:
      - user: user:org-owner
        object: organization:acme
        assertions:
          owner: true
          admin: true
          member: true
          viewer: true
          can_view: true
          can_manage: true
          can_manage_members: true

  - name: organization admin inherits member but not owner
    check:
      - user: user:org-admin
        object: organization:acme
        assertions:
          owner: false
          admin: true
          member: true
          viewer: true
          can_view: true
          can_manage: true
          can_manage_members: true

  - name: organization member can view but not manage
    check:
      - user: user:org-member
        object: organization:acme
        assertions:
          owner: false
          admin: false
          member: true
          viewer: true
          can_view: true
          can_manage: false
          can_manage_members: false

  - name: organization viewer can only view
    check:
      - user: user:org-viewer
        object: organization:acme
        assertions:
          owner: false
          admin: false
          member: false
          viewer: true
          can_view: true
          can_manage: false
          can_manage_members: false

  - name: organization owner inherits project admin via relation
    check:
      - user: user:org-owner
        object: project:alpha
        assertions:
          admin: true
          member: true
          viewer: true
          can_view: true
          can_edit: true
          can_admin: true

  - name: organization admin inherits project admin via relation
    check:
      - user: user:org-admin
        object: project:alpha
        assertions:
          admin: true
          member: true
          viewer: true
          can_view: true
          can_edit: true
          can_admin: true

  - name: project member can edit but not admin
    check:
      - user: user:proj-member
        object: project:alpha
        assertions:
          admin: false
          member: true
          viewer: true
          can_view: true
          can_edit: true
          can_admin: false

  - name: project viewer can only view
    check:
      - user: user:proj-viewer
        object: project:alpha
        assertions:
          admin: false
          member: false
          viewer: true
          can_view: true
          can_edit: false
          can_admin: false

  - name: organization member without direct project role has no project access
    check:
      - user: user:org-member
        object: project:alpha
        assertions:
          admin: false
          member: false
          viewer: false
          can_view: false
          can_edit: false
          can_admin: false
